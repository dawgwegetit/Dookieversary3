<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Kookie's Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Dancing+Script:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --n1:#001a2e; --n2:#002a45; --n3:#003a5c; --n4:#004369;
  --nd:#001220; --nd2:#000d17;
  --p1:#8a0c2e; --p2:#b01038; --p3:#db1f48; --p4:#e8466a; --p5:#f07a93; --p6:#ffd0da; --p7:#fff0f3;
  --line:rgba(219,31,72,.4); --line-soft:rgba(219,31,72,.22);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Outfit',sans-serif;color:var(--p6);background:var(--nd2);min-height:100vh;overflow:hidden;position:fixed;inset:0;-webkit-font-smoothing:antialiased;user-select:none}

/* ===== BACKDROP ===== */
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 90% at 50% -20%, #004369 0%, #003a5c 25%, #002a45 55%, var(--n1) 80%, #000d17 100%)}
#bg::before{content:"";position:absolute;inset:0;background:radial-gradient(60% 40% at 80% 10%, rgba(91,159,196,.14), transparent 60%),radial-gradient(50% 35% at 15% 80%, rgba(219,31,72,.16), transparent 60%)}
#starfield{position:fixed;inset:0;z-index:1;pointer-events:none}
.moon{position:fixed;top:4%;right:8%;width:84px;height:84px;border-radius:50%;z-index:1;background:radial-gradient(circle at 36% 34%,var(--p7),var(--p6) 50%,var(--p4));box-shadow:0 0 70px 24px rgba(219,31,72,.32),inset -12px -10px 26px rgba(138,12,46,.55);animation:moonG 9s ease-in-out infinite}
@keyframes moonG{0%,100%{box-shadow:0 0 70px 24px rgba(219,31,72,.28),inset -12px -10px 26px rgba(138,12,46,.55)}50%{box-shadow:0 0 100px 32px rgba(219,31,72,.45),inset -12px -10px 26px rgba(138,12,46,.55)}}
#petals{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.petal{position:absolute;top:-30px;border-radius:60% 0 60% 0;opacity:.7;background:linear-gradient(135deg,var(--p4),var(--p2));box-shadow:0 0 6px rgba(219,31,72,.25);animation:petalfall linear infinite}
@keyframes petalfall{0%{transform:translate(0,-30px) rotate(0)}25%{transform:translate(26px,28vh) rotate(95deg)}50%{transform:translate(-14px,55vh) rotate(180deg)}75%{transform:translate(20px,80vh) rotate(280deg)}100%{transform:translate(-8px,108vh) rotate(380deg)}}

/* ===== CURTAIN ===== */
#curtain{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:var(--n1)}
.ch{position:absolute;top:0;height:100%;width:51%;background:linear-gradient(120deg,#002a45,#000f1d);transition:transform 1.6s cubic-bezier(.7,0,.2,1);box-shadow:inset 0 0 80px rgba(0,0,0,.5)}
.ch.l{left:0;border-right:1px solid var(--line)}.ch.r{right:0;border-left:1px solid var(--line)}
#curtain.open .l{transform:translateX(-101%)}#curtain.open .r{transform:translateX(101%)}
#curtain.hidden{display:none}
.knock{position:relative;z-index:2;text-align:center;animation:fU 1s ease both .2s;padding:0 24px}
.knock .pre{font-family:'Dancing Script',cursive;font-size:1.6rem;color:var(--p5);margin-bottom:6px}
.knock h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(2.3rem,7vw,3.6rem);background:linear-gradient(180deg,var(--p7) 0%,var(--p4) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.knock .sub{font-family:'Dancing Script',cursive;font-size:1.6rem;color:var(--p5);margin-top:12px}
.knock .tap{margin-top:28px;font-size:.76rem;letter-spacing:.32em;text-transform:uppercase;color:var(--p5);opacity:.75;animation:pulse 2s infinite}
.divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px auto}
.divider .ln{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--p4),transparent)}
.divider .dia{width:8px;height:8px;background:var(--p4);transform:rotate(45deg);box-shadow:0 0 8px var(--p4)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fU{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* ===== GAME STAGE ===== */
#game{position:fixed;inset:0;z-index:5;opacity:0;transition:opacity .8s .3s}
#game.show{opacity:1}
#hud{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;pointer-events:none}
.hud-room{font-family:'Dancing Script',cursive;font-size:1.5rem;color:var(--p5);text-shadow:0 1px 10px rgba(0,0,0,.6)}
.hud-hearts{display:flex;gap:6px}
.hud-hearts .hh{width:20px;height:20px;opacity:.35;transition:all .4s;filter:drop-shadow(0 0 6px rgba(219,31,72,.5))}
.hud-hearts .hh.full{opacity:1;transform:scale(1.15)}
#objective{position:absolute;top:52px;left:50%;transform:translateX(-50%);text-align:center;z-index:20;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--p6);pointer-events:none;background:rgba(0,18,32,.72);border:1px solid var(--line-soft);border-radius:20px;padding:7px 18px;max-width:86vw;backdrop-filter:blur(4px)}

#viewport{position:absolute;inset:0;overflow:hidden}
#world{position:absolute;bottom:0;height:72vh;will-change:transform}
.roomdeco{position:absolute;bottom:0;left:0;right:0;height:100%}
#floor{position:absolute;bottom:0;left:0;right:0;height:16vh;background:linear-gradient(180deg,rgba(0,42,69,.9),rgba(0,18,32,.95));border-top:2px solid var(--line)}
#floor::after{content:"";position:absolute;inset:0;background-image:linear-gradient(90deg,rgba(219,31,72,.08) 1px,transparent 1px);background-size:70px 100%}

.obj{position:absolute;bottom:15vh;cursor:pointer;transition:transform .2s,filter .2s;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
.obj:hover{transform:translateY(-4px)}
.obj .glint{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:15px;animation:glintf 1.8s ease-in-out infinite;pointer-events:none}
@keyframes glintf{0%,100%{opacity:.35;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(-5px)}}
.obj.checked{filter:grayscale(.4) brightness(.7) drop-shadow(0 6px 14px rgba(0,0,0,.5))}
.obj.checked .glint{display:none}
.obj.shake{animation:objshake .45s}
@keyframes objshake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}

/* the girl */
#girl{position:absolute;bottom:15vh;width:76px;height:126px;z-index:10;will-change:transform;pointer-events:none}
#girl .flip{width:100%;height:100%;transition:transform .15s}
#girl.left .flip{transform:scaleX(-1)}
.gleg{transform-origin:38px 84px}
#girl.walking .gl1{animation:step1 .32s ease-in-out infinite}
#girl.walking .gl2{animation:step2 .32s ease-in-out infinite}
@keyframes step1{0%,100%{transform:rotate(18deg)}50%{transform:rotate(-18deg)}}
@keyframes step2{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}}
.garm{transform-origin:38px 60px}
#girl.walking .ga1{animation:step2 .32s ease-in-out infinite}
#girl.walking .ga2{animation:step1 .32s ease-in-out infinite}
.ghair{transform-origin:20% 15%}
#girl.walking .ghair{animation:hairb .3s ease-in-out infinite}
@keyframes hairb{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-8deg)}}
.ahoge{transform-origin:39px 10px;animation:ahogeboing 2.4s ease-in-out infinite}
#girl.walking .ahoge{animation:ahogeboing .45s ease-in-out infinite}
@keyframes ahogeboing{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(14deg)}}

/* sneaky tiptoe mode */
#girl.sneak .gbody{animation:sneaklean .6s ease-in-out infinite}
@keyframes sneaklean{0%,100%{transform:translateY(-1px) rotate(8deg)}50%{transform:translateY(-5px) rotate(10deg)}}
#girl.sneak.walking .gl1{animation:step1 .6s ease-in-out infinite}
#girl.sneak.walking .gl2{animation:step2 .6s ease-in-out infinite}
#girl.sneak.walking .ga1{animation:step2 .6s ease-in-out infinite}
#girl.sneak.walking .ga2{animation:step1 .6s ease-in-out infinite}
#girl.sneak.walking .ghair{animation:hairb .6s ease-in-out infinite}
#girl.sneak .ahoge{animation:ahogeboing .8s ease-in-out infinite}
#girl{transition:opacity .6s}

/* sneak scene: darkness + the bedroom door */
#sneakdark{position:absolute;inset:0;z-index:8;pointer-events:none;background:radial-gradient(60% 50% at var(--gxp,10%) 70%, transparent 0%, rgba(0,6,12,.55) 60%, rgba(0,6,12,.75) 100%);opacity:0;transition:opacity .8s}
#sneakdark.on{opacity:1}
#sneakdoor{position:absolute;bottom:15vh;width:110px;height:200px;perspective:600px;z-index:9}
#sneakdoor .sframe{position:absolute;inset:0;border:3px solid var(--p3);border-bottom:none;border-radius:8px 8px 0 0;background:rgba(0,18,32,.5);box-shadow:0 0 24px rgba(219,31,72,.25)}
#sneakdoor .sglow{position:absolute;inset:4px;border-radius:5px 5px 0 0;background:radial-gradient(circle at center,var(--p7),var(--p5) 70%,var(--p3));opacity:0;transition:opacity 1s .3s}
#sneakdoor .sdoor{position:absolute;inset:4px;transform-origin:left center;border-radius:5px 5px 0 0;background:linear-gradient(120deg,var(--n4),var(--n2));box-shadow:inset 0 0 18px rgba(0,0,0,.5);transition:transform 1.1s cubic-bezier(.6,.05,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:12px;z-index:2}
#sneakdoor .sknob{width:9px;height:9px;border-radius:50%;background:var(--p4);box-shadow:0 0 8px var(--p4)}
#sneakdoor .slabel{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;font-size:1.05rem;color:var(--p5);white-space:nowrap;text-shadow:0 1px 8px rgba(0,0,0,.7)}
#sneakdoor.open .sdoor{transform:rotateY(-85deg)}
#sneakdoor.open .sglow{opacity:1}
.worldshake{animation:wshake .5s}
@keyframes wshake{0%,100%{margin-top:0}25%{margin-top:-4px}50%{margin-top:3px}75%{margin-top:-2px}}

/* doogie waiting by his door */
#doogie{position:absolute;bottom:15vh;width:76px;height:126px;z-index:11;pointer-events:none}
#doogie .dwob{width:100%;height:100%;transform-origin:50% 100%;animation:dwob 1.2s ease-in-out infinite}
@keyframes dwob{0%,100%{transform:rotate(-2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-3px)}}
#doogie .dwave{position:absolute;top:-34px;left:50%;transform:translateX(-50%) scale(0);background:rgba(0,18,32,.88);border:1px solid var(--p4);color:var(--p6);font-family:'Dancing Script',cursive;font-size:1.05rem;padding:5px 12px;border-radius:14px;white-space:nowrap;transition:transform .3s cubic-bezier(.2,1.5,.4,1)}
#doogie .dwave.show{transform:translateX(-50%) scale(1)}
#doogie .dwave::after{content:"";position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--p4)}
#girl.walking .gbody{animation:bob .3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
#emote{position:absolute;top:-30px;left:50%;transform:translateX(-50%) scale(0);background:rgba(0,18,32,.85);border:1px solid var(--p4);color:var(--p6);font-family:'Dancing Script',cursive;font-size:1.05rem;padding:5px 12px;border-radius:14px;white-space:nowrap;transition:transform .25s cubic-bezier(.2,1.4,.4,1);pointer-events:none}
#emote.show{transform:translateX(-50%) scale(1)}
.dust{position:absolute;bottom:0;width:8px;height:8px;border-radius:50%;background:rgba(240,122,147,.4);animation:dustpop .5s ease-out forwards;pointer-events:none}
@keyframes dustpop{0%{opacity:.7;transform:scale(.5)}100%{opacity:0;transform:translateY(-14px) scale(1.6)}}

/* exit arrow */
#exit{position:absolute;bottom:32vh;display:none;flex-direction:column;align-items:center;gap:4px;z-index:9;cursor:pointer;animation:exitf 1.4s ease-in-out infinite}
#exit.show{display:flex}
#exit .arr{font-size:2rem;color:var(--p4);text-shadow:0 0 14px rgba(219,31,72,.7)}
#exit .lbl{font-family:'Dancing Script',cursive;font-size:1.1rem;color:var(--p5)}
@keyframes exitf{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}

/* ===== MODALS (question / letter / finale text) ===== */
.modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,9,16,.6);backdrop-filter:blur(6px)}
.modal.show{display:flex}
.card{position:relative;max-width:430px;width:100%;background:linear-gradient(165deg,rgba(0,42,69,.92) 0%,rgba(0,33,55,.92) 50%,rgba(0,22,38,.95) 100%);border-radius:8px;padding:42px 26px 34px;text-align:center;box-shadow:0 50px 90px -30px rgba(0,0,0,.8),0 0 0 1px rgba(219,31,72,.45),inset 0 0 60px rgba(91,159,196,.05);animation:cardin .5s cubic-bezier(.2,.9,.3,1) both}
@keyframes cardin{from{opacity:0;transform:translateY(28px) scale(.95)}to{opacity:1;transform:none}}
.card::before{content:"";position:absolute;inset:12px;border:1px solid rgba(219,31,72,.4);border-radius:4px;pointer-events:none}
.corner{position:absolute;width:34px;height:34px;pointer-events:none;opacity:.95}
.corner.tl{top:7px;left:7px}.corner.tr{top:7px;right:7px;transform:scaleX(-1)}
.corner.bl{bottom:7px;left:7px;transform:scaleY(-1)}.corner.br{bottom:7px;right:7px;transform:scale(-1,-1)}
.corner svg{width:100%;height:100%}
.eyebrow{font-family:'Dancing Script',cursive;font-size:1.7rem;color:var(--p4);line-height:1}
.gold-div{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px auto 14px}
.gold-div .ln{width:52px;height:1px;background:linear-gradient(90deg,transparent,var(--p4),transparent)}
.gold-div .dia{width:7px;height:7px;background:var(--p4);transform:rotate(45deg);box-shadow:0 0 6px rgba(219,31,72,.5)}
.q{font-family:'Cormorant Garamond',serif;font-weight:600;font-style:italic;font-size:1.7rem;line-height:1.22;color:var(--p6);margin:4px auto 16px;max-width:20ch}
.fl{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#5b9fc4;margin-bottom:10px;font-weight:500}
input[type=text]{width:100%;background:rgba(0,22,38,.6);border:1.5px solid rgba(219,31,72,.5);border-radius:4px;padding:14px 16px;color:var(--p6);font-family:'Outfit',sans-serif;font-size:1.05rem;text-align:center;letter-spacing:.06em;outline:none;transition:border .25s,box-shadow .25s}
input[type=text]:focus{border-color:var(--p4);box-shadow:0 0 0 3px rgba(219,31,72,.18),0 0 18px rgba(219,31,72,.12)}
input::placeholder{color:rgba(255,208,218,.32)}
.btn{margin-top:16px;width:100%;border:none;border-radius:4px;padding:15px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:500;font-size:.92rem;letter-spacing:.16em;text-transform:uppercase;color:var(--p7);background:linear-gradient(100deg,var(--p2),var(--p3),var(--p2));background-size:200% 100%;box-shadow:0 14px 26px -10px rgba(219,31,72,.55),inset 0 1px 0 rgba(255,255,255,.2);transition:transform .15s,background-position .5s;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-2px);background-position:100% 0}
.btn .shine{position:absolute;top:0;left:-80%;width:60%;height:100%;pointer-events:none;background:linear-gradient(105deg,transparent,rgba(255,255,255,.3) 50%,transparent);transform:skewX(-20deg);animation:shinesweep 4.5s ease-in-out infinite}
@keyframes shinesweep{0%,55%{left:-80%}75%,100%{left:130%}}
.err{color:var(--p5);font-family:'Dancing Script',cursive;font-size:1.3rem;height:22px;margin-top:12px;opacity:0;transition:opacity .3s}
.err.show{opacity:1}
.shakec{animation:cshake .42s}
@keyframes cshake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
.found-kicker{font-family:'Dancing Script',cursive;font-size:2rem;color:var(--p4);line-height:1;text-shadow:0 1px 14px rgba(219,31,72,.3)}
.where{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.5rem;color:var(--p5);margin:10px 0 8px}
.note{font-family:'Dancing Script',cursive;font-size:1.3rem;line-height:1.35;color:var(--p6);max-width:30ch;margin:0 auto}
.bigheart{font-size:3.2rem;display:inline-block;margin:0 0 4px;filter:drop-shadow(0 0 22px rgba(219,31,72,.7));animation:heartbeat 1.3s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}12%{transform:scale(1.22)}24%{transform:scale(1)}36%{transform:scale(1.14)}48%{transform:scale(1)}}
.t{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:2.3rem;line-height:1.08;background:linear-gradient(180deg,var(--p7) 0%,var(--p4) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.finalmsg{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.3rem;line-height:1.5;color:var(--p6);max-width:28ch;margin:8px auto 0}
.tbc{margin-top:16px;font-family:'Dancing Script',cursive;font-size:1.6rem;color:var(--p4);text-shadow:0 0 18px rgba(219,31,72,.5);animation:tbcGlow 2.6s ease-in-out infinite}
@keyframes tbcGlow{0%,100%{text-shadow:0 0 14px rgba(219,31,72,.4)}50%{text-shadow:0 0 26px rgba(219,31,72,.75)}}
.door-wrap{width:120px;height:160px;margin:10px auto 14px}
.door-frame{width:100%;height:100%;position:relative;border-radius:10px 10px 0 0;background:linear-gradient(180deg,var(--n3),var(--n1));border:3px solid var(--p3);box-shadow:0 0 40px rgba(219,31,72,.45)}
.door-glow{position:absolute;inset:5px;border-radius:6px 6px 0 0;background:radial-gradient(circle at center,var(--p7),var(--p5) 65%,var(--p3));opacity:0;transition:opacity 1.6s .5s}
.door-glow.lit{opacity:1}
.door{position:absolute;inset:5px;transform-origin:left center;border-radius:6px 6px 0 0;background:linear-gradient(120deg,var(--n4),var(--n2));transition:transform 1.8s cubic-bezier(.6,.05,.2,1);box-shadow:inset 0 0 22px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:flex-end;padding-right:12px;z-index:2}
.door.ajar{transform:rotateY(-46deg)}
.knob{width:10px;height:10px;border-radius:50%;background:var(--p4);box-shadow:0 0 8px var(--p4)}

/* intro modal big name */
.names{font-family:'Dancing Script',cursive;font-size:1.7rem;color:var(--p4);line-height:1}
.bigname{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:clamp(3rem,15vw,4.4rem);letter-spacing:1px;margin:2px 0;filter:drop-shadow(0 2px 20px rgba(219,31,72,.3))}
.bigname .ltr{display:inline-block;opacity:0;transform:translateY(-50px) rotate(-12deg) scale(.7);animation:drop .6s cubic-bezier(.2,1.3,.4,1) forwards;background:linear-gradient(170deg,var(--p7) 0%,var(--p5) 55%,var(--p3) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
@keyframes drop{to{opacity:1;transform:none}}
.lede{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.18rem;line-height:1.55;color:var(--p6);opacity:.92;margin:8px auto 18px;max-width:30ch}
.datescript{margin:2px auto 8px;display:block;height:60px;width:100%;max-width:320px}

/* music + dance buttons */
#music,#danceBtn2{position:fixed;z-index:45;width:44px;height:44px;border-radius:50%;border:1px solid var(--p3);background:rgba(0,26,46,.75);backdrop-filter:blur(8px);color:var(--p4);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;box-shadow:0 4px 14px rgba(0,0,0,.5)}
#music{bottom:16px;right:16px}
#danceBtn2{bottom:16px;left:16px}
#music:hover,#danceBtn2:hover{transform:scale(1.1)}

/* ===== DANCE FLOOR (kept) ===== */
#disco{position:fixed;inset:0;z-index:80;display:none;overflow:hidden;background:radial-gradient(120% 100% at 50% 0%, #004369 0%, #003a5c 28%, #002a45 60%, #001a2e 100%)}
#disco.show{display:block;animation:discoIn .6s ease both}
@keyframes discoIn{from{opacity:0}to{opacity:1}}
.spotlights{position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;overflow:hidden}
.beam{position:absolute;top:-30%;left:50%;width:160px;height:160vh;transform-origin:top center}
.beam.b1{background:linear-gradient(to bottom,rgba(91,159,196,0),rgba(91,159,196,.28) 30%,transparent);animation:sweep1 5s ease-in-out infinite}
.beam.b2{background:linear-gradient(to bottom,rgba(219,31,72,0),rgba(219,31,72,.28) 30%,transparent);animation:sweep2 6s ease-in-out infinite}
.beam.b3{background:linear-gradient(to bottom,rgba(240,122,147,0),rgba(240,122,147,.3) 30%,transparent);animation:sweep3 4.5s ease-in-out infinite}
@keyframes sweep1{0%,100%{transform:translateX(-50%) rotate(-28deg)}50%{transform:translateX(-50%) rotate(20deg)}}

.discoball-wrap{position:absolute;top:0;left:50%;transform:translateX(-50%);text-align:center;z-index:3}

.dfloor{position:absolute;bottom:0;left:0;right:0;height:42vh;z-index:2;background:linear-gradient(to top, rgba(0,67,105,.7), transparent);perspective:500px;overflow:hidden}
.dfloor-grid{position:absolute;bottom:0;left:-20%;right:-20%;height:100%;background-image:linear-gradient(rgba(219,31,72,.18) 2px,transparent 2px),linear-gradient(90deg,rgba(219,31,72,.18) 2px,transparent 2px);background-size:48px 48px;transform:rotateX(62deg);transform-origin:bottom;animation:floorMove 1.5s linear infinite}

.d1{animation:bop1 .62s ease-in-out infinite}.d2{animation:bop2 .56s ease-in-out infinite}.d3{animation:bop3 .68s ease-in-out infinite}

@keyframes bop2{0%,100%{transform:translateY(-4px) rotate(2deg)}50%{transform:translateY(-22px) rotate(-2deg)}}

.arm-l{transform-origin:75% 18%;animation:armL .6s ease-in-out infinite}
.arm-r{transform-origin:25% 18%;animation:armR .6s ease-in-out infinite}
@keyframes armL{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-44deg)}}
@keyframes armR{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(44deg)}}

.disco-close{position:absolute;top:16px;right:16px;z-index:10;width:44px;height:44px;border-radius:50%;border:1px solid var(--p3);background:rgba(0,18,32,.7);color:var(--p4);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:transform .25s}

.taph{position:fixed;z-index:70;pointer-events:none;font-size:20px;transform:translate(-50%,-50%);animation:taphpop 1s ease-out forwards}

/* ================= GAME ENGINE ================= */
const world=document.getElementById('world'),girlEl=document.getElementById('girl'),
 girlsvg=document.getElementById('girlsvg'),objectsEl=document.getElementById('objects'),
 decoEl=document.getElementById('deco'),exitEl=document.getElementById('exit'),
 emoteEl=document.getElementById('emote'),viewport=document.getElementById('viewport'),
 roomNameEl=document.getElementById('roomName'),objectiveEl=document.getElementById('objective'),
 heartsEl=document.getElementById('hearts');

girlsvg.innerHTML=girlSVG();

let roomIdx=0,gx=120,target=120,speed=4.6,playing=false,roomDone=false,pendingObj=null,cam=0,lastDust=0;
let mode='quest';const SNEAK_W=1150;let sneak={target:0,creaked:false,entered:false,done:false};

function heartsHUD(){heartsEl.innerHTML='';for(let i=0;i<ROOM.treasures.length;i++){const h=document.createElement('div');h.className='hh'+(i<tStep?' full':'');h.innerHTML=`<svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 21 C5 15 2 11 2 7.5 C2 4.5 4.5 2.5 7 2.5 C9 2.5 11 4 12 6 C13 4 15 2.5 17 2.5 C19.5 2.5 22 4.5 22 7.5 C22 11 19 15 12 21Z" fill="#db1f48"/></svg>`;heartsEl.appendChild(h);}}

function loadRoom(i){ // single big room
 tStep=0;pendingObj=null;
 world.style.width=ROOM.width+'px';
 decoEl.innerHTML=decoSVG(0,ROOM.width);
 roomNameEl.textContent=ROOM.name;
 objectiveEl.textContent=ROOM.objectives[0];
 exitEl.classList.remove('show');
 objectsEl.innerHTML='';
 ROOM.objects.forEach((o,oi)=>{
  const d=document.createElement('div');d.className='obj';d.dataset.i=oi;
  d.style.left=o.x+'px';d.innerHTML=`<span class="glint">&#10024;</span>${objSVG(o.type)}`;
  // only the current treasure object glints
  if(o.treasure!==0)d.querySelector('.glint').style.display='none';
  objectsEl.appendChild(d);
 });
 gx=90;target=90;girlEl.classList.remove('left');
 heartsHUD();
 objectiveEl.style.opacity='1';
 setTimeout(()=>{objectiveEl.style.transition='opacity 1s';objectiveEl.style.opacity='0';},3800);
}
function updateGlints(){
 ROOM.objects.forEach((o,oi)=>{
  const d=objectsEl.querySelector(`[data-i="${oi}"]`);if(!d)return;
  const g=d.querySelector('.glint');if(!g)return;
  g.style.display=(o.treasure===tStep)?'':'none';
 });
}

function emote(txt,ms=1300){emoteEl.textContent=txt;emoteEl.classList.add('show');clearTimeout(emote._t);emote._t=setTimeout(()=>emoteEl.classList.remove('show'),ms);}

function objCenter(o){const el=objectsEl.querySelector(`[data-i="${o}"]`);if(!el)return 0;return parseFloat(el.style.left)+el.firstElementChild.nextElementSibling?0:0;}

function tick(){
 if(mode==='sneak'&&!sneak.done){
  const dx=sneak.target-gx;
  if(Math.abs(dx)>2){
   gx+=Math.sign(dx)*2.4;
   girlEl.classList.add('walking');girlEl.classList.toggle('left',dx<0);
  }else girlEl.classList.remove('walking');
  /* the creak moment */
  if(!sneak.creaked && gx>SNEAK_W*0.45){
   sneak.creaked=true;const resume=sneak.target;sneak.target=gx;
   emote("!! ...a creak \u{1F628}",1100);
   world.classList.add('worldshake');setTimeout(()=>world.classList.remove('worldshake'),520);
   setTimeout(()=>{emote("\u{1F92B} phew... keep going",1300);sneak.target=resume;},1400);
  }
  /* arriving at the bedroom door */
  if(!sneak.entered && sneak.creaked && Math.abs(gx-(SNEAK_W-210))<6){
   sneak.entered=true;
   const door=document.getElementById('sneakdoor');
   emote("the door!! \u{1F440}",1100);
   setTimeout(()=>{door.classList.add('open');chime(true);},700);
   setTimeout(()=>{sneak.target=SNEAK_W-150;},1300);
   setTimeout(()=>{girlEl.style.opacity='0';const dg=document.getElementById('doogie');if(dg){dg.style.transition='opacity .6s';dg.style.opacity='0';}},2300);
   setTimeout(()=>{sneak.done=true;showSneakSuccess();},3100);
  }
  girlEl.style.transform=`translateX(${gx}px)`;
  const vw=viewport.clientWidth;
  cam=Math.max(0,Math.min(SNEAK_W-vw, gx-vw/2+37));

  const dk=document.getElementById('sneakdark');
  if(dk)dk.style.setProperty('--gxp',((gx-cam)/vw*100)+'%');
 }
 else if(playing){
  const dx=target-gx;
  if(Math.abs(dx)>3){
   gx+=Math.sign(dx)*speed;
   girlEl.classList.add('walking');
   girlEl.classList.toggle('left',dx<0);
   if(performance.now()-lastDust>120){lastDust=performance.now();const du=document.createElement('div');du.className='dust';du.style.left=(gx+(dx<0?52:10))+'px';du.style.bottom='15vh';world.appendChild(du);setTimeout(()=>du.remove(),520);}
  }else{
   girlEl.classList.remove('walking');
   if(pendingObj!=null){const o=pendingObj;pendingObj=null;arriveAt(o);}
  }
  girlEl.style.transform=`translateX(${gx}px)`;
  const vw=viewport.clientWidth;
  cam=Math.max(0,Math.min(ROOM.width-vw, gx-vw/2+37));
  world.style.transform=`translateX(${-cam}px)`;
 }
 requestAnimationFrame(tick);
}

function drawDateScript(cv){
 const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
 ctx.font="italic 600 52px 'Dancing Script', cursive";ctx.textAlign="center";ctx.textBaseline="middle";
 const grad=ctx.createLinearGradient(0,0,W,0);grad.addColorStop(0,'#8a0c2e');grad.addColorStop(.5,'#f07a93');grad.addColorStop(1,'#db1f48');
 let f=0,T=60;
 (function step(){ctx.clearRect(0,0,W,H);ctx.save();const w=Math.min(1,f/T);ctx.beginPath();ctx.rect(0,0,W*w,H);ctx.clip();ctx.fillStyle=grad;ctx.shadowColor='rgba(219,31,72,.6)';ctx.shadowBlur=16;ctx.fillText(DATE_TEXT,W/2,H/2);ctx.restore();
 if(w<1){ctx.beginPath();ctx.arc(W*w,H/2+Math.sin(f/4)*4,4,0,7);ctx.fillStyle='#fff0f3';ctx.shadowColor='#f07a93';ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;}
 if(f<T+40){f++;requestAnimationFrame(step);}})();
}

/* ---------- effects ---------- */
function burstAt(x,y,n){const e=['\u2764\uFE0F','\u{1F339}','\u2728','\u{1F495}','\u{1F498}'];
 for(let i=0;i<n;i++){const p=document.createElement('div');p.textContent=e[i%e.length];
  p.style.cssText=`position:fixed;left:${x}px;top:${y}px;font-size:${13+Math.random()*14}px;z-index:75;pointer-events:none;transition:transform 1.6s cubic-bezier(.2,.6,.4,1),opacity 1.6s`;
  document.body.appendChild(p);const a=Math.random()*Math.PI*2,d=60+Math.random()*150;
  requestAnimationFrame(()=>{p.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d-40}px) rotate(${Math.random()*180-90}deg)`;p.style.opacity='0';});
  setTimeout(()=>p.remove(),1700);}}
function goldStream(){const cs=['#e8466a','#f07a93','#ffd0da','#db1f48'];
 for(let i=0;i<70;i++){const d=document.createElement('div');const sz=2+Math.random()*5;const c=cs[i%4];
  d.style.cssText=`position:fixed;left:50%;top:45%;width:${sz}px;height:${sz}px;background:${c};border-radius:50%;box-shadow:0 0 ${sz*2}px ${c};z-index:85;pointer-events:none;transition:transform 2.6s cubic-bezier(.2,.6,.3,1),opacity 2.6s`;
  document.body.appendChild(d);const a=Math.random()*Math.PI*2,dist=180+Math.random()*380;
  requestAnimationFrame(()=>{d.style.transform=`translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px)`;d.style.opacity='0';});
  setTimeout(()=>d.remove(),2700);}}

/* starfield + shooting star */
const sf=document.getElementById('starfield'),sctx=sf.getContext('2d');let stars=[];var shoot=null;
function resize(){sf.width=innerWidth;sf.height=innerHeight;stars=[];for(let i=0;i<100;i++)stars.push({x:Math.random()*sf.width,y:Math.random()*sf.height*.8,r:Math.random()*1.4+.3,p:Math.random()*6,pink:Math.random()<.4});}
function maybeShoot(){if(!shoot&&Math.random()<.006){shoot={x:Math.random()*sf.width*.7+sf.width*.15,y:Math.random()*sf.height*.3+20,vx:6+Math.random()*4,vy:2+Math.random()*1.5,life:1};}
 if(shoot){sctx.strokeStyle=`rgba(255,220,228,${shoot.life})`;sctx.lineWidth=1.6;sctx.beginPath();sctx.moveTo(shoot.x,shoot.y);sctx.lineTo(shoot.x-shoot.vx*6,shoot.y-shoot.vy*6);sctx.stroke();shoot.x+=shoot.vx;shoot.y+=shoot.vy;shoot.life-=.025;if(shoot.life<=0||shoot.x>sf.width+60)shoot=null;}}
function twinkle(){sctx.clearRect(0,0,sf.width,sf.height);stars.forEach(s=>{s.p+=.03;const a=.3+.55*Math.abs(Math.sin(s.p));sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,7);sctx.fillStyle=s.pink?`rgba(219,31,72,${a})`:`rgba(255,250,239,${a*.85})`;sctx.fill();});maybeShoot();requestAnimationFrame(twinkle);}
addEventListener('resize',resize);resize();twinkle();

/* petals */
(function(){const c=document.getElementById('petals');for(let i=0;i<8;i++){const p=document.createElement('div');p.className='petal';const s=8+Math.random()*8;p.style.width=s+'px';p.style.height=s+'px';p.style.left=Math.random()*100+'%';p.style.animationDuration=(11+Math.random()*9)+'s';p.style.animationDelay=(-Math.random()*18)+'s';c.appendChild(p);}})();

/* ---------- music (guarded) ---------- */
let started=false,muted=false,synth,loop;
const hasTone=()=>typeof Tone!=='undefined';
function startMusic(){if(started||muted||!hasTone())return;started=true;try{
 const rev=new Tone.Reverb({decay:6,wet:.5}).toDestination();
 // music-box lead (bell-like)
 const box=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.005,decay:1.1,sustain:.05,release:1.2}}).connect(rev);
 box.volume.value=-13;
 // soft pad underneath
 const pad=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},envelope:{attack:1.2,decay:1.5,sustain:.5,release:3}}).connect(rev);
 pad.volume.value=-24;
 synth=box;
 // "You Are My Sunshine" melody (C major). [note, beats]
 const mel=[
  ['C4',.5],['F4',.75],['F4',.5],['F4',.75],['A4',.5],['G4',.5],['F4',.75],
  ['A4',.5],['A4',.5],['A4',.5],['A4',.5],['G4',.5],['F4',1.5],
  ['C4',.5],['F4',.75],['F4',.5],['F4',.75],['A4',.5],['G4',.5],['F4',.75],
  ['C5',1],['C5',.5],['A4',.5],['G4',1.5],
  ['C5',.5],['C5',.75],['C5',.5],['A4',.75],['C5',.5],['A4',.5],['F4',.75],
  ['A4',.5],['A4',.5],['A4',.5],['A4',.5],['G4',.5],['F4',1.5],
  ['C4',.5],['F4',.75],['F4',.5],['F4',.75],['A4',.5],['G4',.5],['F4',.75],
  ['C5',1],['C5',.5],['A4',.5],['F4',2]
 ];
 // chord under each phrase (changes slowly)
 const chords=[['F3','A3','C4'],['F3','A3','C4'],['C3','E3','G3'],['F3','A3','C4'],
   ['F3','A3','C4'],['C3','E3','G3'],['Bb2','D3','F3'],['F3','A3','C4'],
   ['C3','E3','G3'],['F3','A3','C4']];
 let idx2=0;
 const spb=60/88;
 function playNext(time){
  const [note,dur]=mel[idx2%mel.length];
  box.triggerAttackRelease(note,dur*0.9*spb,time);
  if(idx2%8===0)pad.triggerAttackRelease(chords[((idx2/8)|0)%chords.length],spb*4,time);
  idx2++;
  Tone.Transport.scheduleOnce(playNext,'+'+(dur*spb));
 }
 Tone.Transport.bpm.value=88;
 Tone.Transport.scheduleOnce(playNext,'+0.2');
 Tone.Transport.start();}catch(e){}}
function chime(g){if(muted||!started||!hasTone())return;try{const s=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.01,decay:.3,sustain:0,release:.4}}).toDestination();s.volume.value=-20;s.triggerAttackRelease(g?'F#5':'A3','16n');}catch(e){}}
function safeToneStart(cb){if(!hasTone()){cb&&cb();return;}Tone.start().then(()=>cb&&cb()).catch(()=>cb&&cb());}
document.getElementById('music').onclick=()=>{muted=!muted;document.getElementById('music').innerHTML=muted?'&#128263;':'&#9834;';if(!hasTone())return;try{if(muted&&Tone.Transport.state==='started')Tone.Transport.pause();else if(!muted){if(!started)Tone.start().then(startMusic);else Tone.Transport.start();}}catch(e){}};

  <rect x="46" y="84" width="8" height="12" fill="${skin}"/><circle cx="50" cy="64" r="22" fill="${skin}"/>
  <path class="dhair" d="M28 64 Q26 36 50 34 Q74 36 72 64 Q66 50 50 50 Q34 50 28 64 Z" fill="${hair}"/>

  <ellipse cx="36" cy="71" rx="3.5" ry="2.2" fill="#f49a9a" opacity=".6"/><ellipse cx="64" cy="71" rx="3.5" ry="2.2" fill="#f49a9a" opacity=".6"/>
  <path d="M46 72 Q50 76 54 72" stroke="#c0506a" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>`;}
function buildDancers(){const host=document.getElementById('dancers');if(!host||host.childElementCount)return;
 const looks=[{skin:'#f6d2b8',hair:'#3a2440',dress:'#5b9fc4',dress2:'#7fb5d4',style:'long'},{skin:'#f8dcc0',hair:'#6b4a1c',dress:'#db1f48',dress2:'#f07a93',style:'twin'},{skin:'#f4cdb0',hair:'#1c2a4a',dress:'#004369',dress2:'#36506b',style:'bob'}];
